name: ollama-gradio-chat
# github_repo_url: https://github.com/transformerlab/transformerlab-examples
# github_repo_dir: inference-tasks/ollama-gradio-chat
resources:
  cpus: 2
  memory: 4
setup: |
  echo "=== SETUP DEBUG ==="
  echo "which python: $(which python)"
  echo "python path: $(python -c 'import sys; print(sys.executable)')"
  echo "sys.path: $(python -c 'import sys; print(sys.path)')"
  echo "which uv: $(which uv)"
  echo "VIRTUAL_ENV: $VIRTUAL_ENV"
  echo "PATH: $PATH"
  uv pip install gradio openai
  echo "=== POST-INSTALL DEBUG ==="
  python -c "import gradio; print('gradio installed at:', gradio.__file__)"
  if ! command -v ollama >/dev/null 2>&1; then curl -fsSL https://ollama.com/install.sh | sh; fi
  if [ "$(uname)" != "Darwin" ]; then $SUDO apt-get update && $SUDO apt-get install -y pciutils lshw; fi
run: |
  export OLLAMA_HOST=0.0.0.0:11434
  ollama serve > /tmp/ollama.log 2>&1 &
  sleep 3
  ollama pull $MODEL_NAME > /tmp/ollama-pull.log 2>&1 &
  sleep 5
  echo "=== RUN DEBUG ==="
  echo "which python: $(which python)"
  echo "python path: $(python -c 'import sys; print(sys.executable)')"
  echo "VIRTUAL_ENV: $VIRTUAL_ENV"
  echo "PATH: $PATH"
  python -c "import gradio; print('gradio found at:', gradio.__file__)" 2>&1 || echo "gradio NOT found in run python"
  OLLAMA_BASE_URL=http://127.0.0.1:11434 MODEL_NAME=$MODEL_NAME python ~/ollama-gradio-chat/gradio_chat.py > /tmp/gradio.log 2>&1 &
  sleep 5
  tail -f /tmp/ollama.log /tmp/ollama-pull.log /tmp/gradio.log
envs:
  PYTHONUNBUFFERED: "1"
parameters:
  model_name:
    field_name: "Model Name"
    env_var: "MODEL_NAME"
    field_type: "str"
    required: true
    placeholder: "e.g. llama2, mistral, codellama"
    help_text: "Ollama model name (e.g. llama2, mistral, codellama)."
