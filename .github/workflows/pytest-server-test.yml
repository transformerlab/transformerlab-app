# This workflow will install Python dependencies and run tests
# Covers both Ubuntu and macOS (replaces the former separate macOS workflow)

name: Test for Install and Serving

on:
  push:
    branches: ["main"]
    paths:
      - "api/**"
      - "lab-sdk/**"
  pull_request:
    branches: ["main"]
    paths:
      - "api/**"
      - "lab-sdk/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        working-directory: api
    env:
      AUTH_CLIENT_ID: ${{ secrets.AUTH_CLIENT_ID }}
      AUTH_API_KEY: ${{ secrets.AUTH_API_KEY }}
      FRONTEND_URL: http://localhost:8338
      AUTH_SUCCESS_REDIRECT_URL: /
      AUTH_ERROR_REDIRECT_URL: /
      AUTH_LOGOUT_REDIRECT_URL: /
      TRANSFORMERLAB_JWT_SECRET: ${{ secrets.TRANSFORMERLAB_JWT_SECRET }}
      TRANSFORMERLAB_REFRESH_SECRET: ${{ secrets.TRANSFORMERLAB_REFRESH_SECRET }}
      EMAIL_METHOD: "dev"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system pytest pytest-asyncio jsonschema requests
          # Minimal api/pyproject.toml only; drop SDK pin so ../lab-sdk editable install wins
          sed -i.bak '/^  "transformerlab==/d' pyproject.toml
          uv pip install --system .
          mv pyproject.toml.bak pyproject.toml || true
      - name: Install lab-sdk in editable mode
        run: |
          cd ../lab-sdk
          uv pip install --system -e .
      - name: Now run the server by calling ./run.sh and wait for it to be ready
        run: |
          # -c: use runner Python (no conda / general-uv); matches minimal CI install
          ./run.sh -c &
          python scripts/wait_for_server.py --timeout 120 --interval 2
      - name: Test the API Server and DB Setup
        run: |
          # Run tests
          pytest -m live_server test/server/
