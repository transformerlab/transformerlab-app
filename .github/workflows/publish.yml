name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Install Node and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build default web bundle
        run: npm run build

      - name: Archive default web bundle
        run: |
          cd release/cloud
          tar -czvf transformerlab_web.tar.gz .
          mv transformerlab_web.tar.gz ../transformerlab_web.tar.gz

      - name: Extract version from package.json
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Ensure GitHub Release exists
        run: |
          gh release view ${{ github.ref_name }} >/dev/null 2>&1 || gh release create ${{ github.ref_name }} --generate-notes --verify-tag --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify install script exists
        run: test -s api/install.sh

      - name: Upload static web assets
        run: |
          gh release upload ${{ github.ref_name }} \
            release/transformerlab_web.tar.gz \
            api/install.sh#install.sh \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
