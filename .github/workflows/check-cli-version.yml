name: Check CLI Version for Release

on:
  pull_request:
    branches:
      - main
    paths:
      - "cli/**"

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - name: Ensure version strings are in sync
        run: |
          set -euo pipefail

          if [ ! -f "pyproject.toml" ]; then
            echo "ERROR: cli/pyproject.toml not found"
            exit 1
          fi

          if [ ! -f "src/transformerlab_cli/__init__.py" ]; then
            echo "ERROR: cli/src/transformerlab_cli/__init__.py not found"
            exit 1
          fi

          PYPROJECT_VERSION=$(awk -F '"' '/^\s*version\s*=\s*"/ {print $2; exit}' pyproject.toml)
          INIT_VERSION=$(awk -F '"' '/^\s*__version__\s*=\s*"/ {print $2; exit}' src/transformerlab_cli/__init__.py)

          if [ -z "${PYPROJECT_VERSION:-}" ]; then
            echo "ERROR: Unable to read cli [project].version from cli/pyproject.toml"
            exit 1
          fi

          if [ -z "${INIT_VERSION:-}" ]; then
            echo "ERROR: Unable to read __version__ from cli/src/transformerlab_cli/__init__.py"
            exit 1
          fi

          if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
            echo "ERROR: CLI version mismatch:"
            echo "  cli/pyproject.toml [project].version: $PYPROJECT_VERSION"
            echo "  cli/src/transformerlab_cli/__init__.py __version__: $INIT_VERSION"
            exit 1
          fi

          echo "CLI version strings are in sync: $PYPROJECT_VERSION"

      - name: Check if version already exists on PyPI
        run: |
          set -euo pipefail

          PKG_NAME=$(grep -E '^name\s*=\s*' pyproject.toml | head -1 | sed 's/name\s*=\s*"\(.*\)"/\1/')
          PKG_VERSION=$(grep -E '^version\s*=\s*' pyproject.toml | head -1 | sed 's/version\s*=\s*"\(.*\)"/\1/')
          echo "Package name: $PKG_NAME"
          echo "Package version: $PKG_VERSION"
          echo "Checking if version exists on PyPI..."

          EXISTS=$(curl -s "https://pypi.org/pypi/$PKG_NAME/json" | grep -F "\"$PKG_VERSION\"" || true)
          if [ -n "$EXISTS" ]; then
            echo "Error: Version $PKG_VERSION of $PKG_NAME already exists on PyPI." >&2
            echo "This change will NOT trigger a new release. Please bump the version in pyproject.toml." >&2
            exit 1
          else
            echo "Version $PKG_VERSION does not exist on PyPI. This change will trigger a new release."
          fi
