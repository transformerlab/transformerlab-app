version: 2
updates:
  # Root Electron + React app
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # sass 1.99.0 introduces a sass-loader deprecation warning on `npm start`.
      # Hold at 1.77.8 until sass-loader catches up. See PR #2091 (reverted by dadmobile).
      - dependency-name: "sass"
        versions: [">1.77.8"]
      # @nivo/* is pre-1.0 and each minor can ship breaking changes. 0.99.0 broke `<Bar>`
      # elements. Hold the nivo packages at 0.88.0 until they're upgraded deliberately.
      # See PR #2091 (reverted by dadmobile).
      - dependency-name: "@nivo/bar"
        versions: [">0.88.0"]
      - dependency-name: "@nivo/core"
        versions: [">0.88.0"]
      - dependency-name: "@nivo/line"
        versions: [">0.88.0"]
      - dependency-name: "@nivo/radar"
        versions: [">0.88.0"]
      # @testing-library/jest-dom 6.x crashes our Jest setup with
      # `ReferenceError: TextEncoder is not defined` when react-router-dom 7's modules
      # load (jsdom env doesn't expose TextEncoder). Stay on 5.x until we add a
      # TextEncoder polyfill in jest.setup. See PR #2113.
      - dependency-name: "@testing-library/jest-dom"
        versions: [">=6"]
      # @typescript-eslint/* v6+ requires bumping plugin AND parser in lockstep, plus
      # ESLint 8.57+/9 and updates to eslint-config-erb. Hold the whole family at 5.x
      # until we do a coordinated upgrade. Security patches on 5.x still flow through.
      # See PR #2114.
      - dependency-name: "@typescript-eslint/*"
        versions: [">=6"]
      # react-markdown v9 went pure ESM and reworked the `components` API (notably the
      # inline-code renderer signature). Three callsites need updates before we can move.
      # Hold at 8.x until that refactor happens. See PR #2117.
      - dependency-name: "react-markdown"
        versions: [">=9"]
      # eslint-plugin-compat is pulled in transitively via eslint-config-erb
      # (`extends: "plugin:compat/recommended"`). ERB's package.json wants ^4.2.0, so
      # we can't move to 5+ ahead of ERB. Hold at 4.x until ERB itself bumps.
      # See PR #2115.
      - dependency-name: "eslint-plugin-compat"
        versions: [">=5"]
      # sass-loader 14+ uses sass's "modern compiler API" by default, which surfaces
      # deprecation warnings for legacy `@import`, `/` division, and color functions
      # used throughout our .scss files. Build still succeeds but dev console gets
      # noisy. Hold at 13.x until the .scss files are migrated to `@use`/`@forward`.
      # See PR #2116.
      - dependency-name: "sass-loader"
        versions: [">=14"]
      # eslint-plugin-promise v7 requires ESLint >=8.56; our `eslint` is pinned at
      # ^8.42.0. Hold until we bump ESLint (which is itself blocked by the
      # @typescript-eslint/* family upgrade — see ignore above). See PR #2122.
      - dependency-name: "eslint-plugin-promise"
        versions: [">=7"]
      # React 19 is a major API change (ref-as-prop, removed legacy APIs, new JSX
      # transform). `react`, `react-dom`, and their @types must move together, and
      # @testing-library/react must move in lockstep (see below). Hold the whole
      # React family at 18.x until a coordinated migration. See PR #2126.
      - dependency-name: "react"
        versions: [">=19"]
      - dependency-name: "react-dom"
        versions: [">=19"]
      - dependency-name: "@types/react"
        versions: [">=19"]
      - dependency-name: "@types/react-dom"
        versions: [">=19"]
      # @testing-library/react v15 dropped React 17 and v16 requires React 19. Bundle
      # this with the React 19 migration. See PR #2127.
      - dependency-name: "@testing-library/react"
        versions: [">=15"]
      # jest-environment-jsdom v30 requires jest@30; we're on jest@29. Hold until a
      # coordinated jest 30 upgrade (which also affects ts-jest, @types/jest, etc.).
      # See PR #2130.
      - dependency-name: "jest-environment-jsdom"
        versions: [">=30"]

  # Docs site (Docusaurus, managed with yarn classic — dependabot's npm ecosystem auto-detects yarn.lock)
  # Build is pinned to Node 18 via transformerlab-docs/netlify.toml. Major bumps are ignored across
  # the board (manual coordination needed); packages that drop Node 18 support in a minor or patch
  # bump are listed individually under `ignore` below. Revisit when the build moves to Node 20+.
  - package-ecosystem: "npm"
    directory: "/transformerlab-docs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docs-deps"
      include: "scope"
    labels:
      - "dependencies"
      - "docs"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "@mdx-js/*"
      react:
        patterns:
          - "react"
          - "react-dom"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # mermaid >= 11.12 requires Node 20+; we're pinned to Node 18 in Netlify.
      - dependency-name: "mermaid"
        versions: [">=11.12"]
      # @docusaurus/* >= 3.9 requires Node >=20 (engines field), Netlify build is Node 18.
      # Hold the docusaurus packages at 3.8.x until the docs build moves to Node 20+.
      # See PRs #2111 (3.10.1) and #2120 (3.9.2) — both failed with EBADENGINE.
      - dependency-name: "@docusaurus/*"
        versions: [">=3.9"]
      # Keep typescript pinned alongside the docusaurus 3.8.x line (which ships with
      # TS 5.6.x in its templates). Avoids surprise breaks from TS bumps before the
      # docs build moves off Node 18.
      - dependency-name: "typescript"
        versions: [">=5.7"]
      # Major bumps on docs deps need manual coordination; minor/patch is enough for security.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # API (FastAPI, managed with uv)
  - package-ecosystem: "uv"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # datasets 4.x removes loading-script support (`trust_remote_code` workflows) that
      # several gallery training scripts rely on. Deliberately pinned to 3.x; a datasets
      # upgrade needs its own dedicated PR with full validation. See PR #2090.
      - dependency-name: "datasets"
        versions: [">=4"]
      # azure-mgmt-resource 25.0.0 removed/relocated `SubscriptionClient`, which our
      # Azure compute provider imports from `azure.mgmt.resource`. Provider health check
      # fails immediately on import. Revisit after refactoring the import path. See PR #2083.
      - dependency-name: "azure-mgmt-resource"
        versions: [">=25"]

  # CLI (Typer, managed with uv)
  - package-ecosystem: "uv"
    directory: "/cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Lab SDK (published to PyPI as `transformerlab`)
  - package-ecosystem: "uv"
    directory: "/lab-sdk"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
