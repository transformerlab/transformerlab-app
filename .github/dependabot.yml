version: 2
updates:
  # Root Electron + React app
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # chalk v5 is pure ESM. `check-build-exists.ts` is in Jest's setupFiles and ts-jest
      # compiles `import chalk from 'chalk'` to `require('chalk')`, which throws
      # ERR_REQUIRE_ESM against chalk 5. Stay on v4 until the Jest setup is refactored to
      # dynamic import or chalk is dropped from setup. See PR #2092.
      - dependency-name: "chalk"
        versions: [">=5"]

  # Docs site (Docusaurus, managed with yarn classic — dependabot's npm ecosystem auto-detects yarn.lock)
  # Build is pinned to Node 18 via transformerlab-docs/netlify.toml. Major bumps are ignored across
  # the board (manual coordination needed); packages that drop Node 18 support in a minor or patch
  # bump are listed individually under `ignore` below. Revisit when the build moves to Node 20+.
  - package-ecosystem: "npm"
    directory: "/transformerlab-docs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docs-deps"
      include: "scope"
    labels:
      - "dependencies"
      - "docs"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "@mdx-js/*"
      react:
        patterns:
          - "react"
          - "react-dom"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # mermaid >= 11.12 requires Node 20+; we're pinned to Node 18 in Netlify.
      - dependency-name: "mermaid"
        versions: [">=11.12"]
      # Major bumps on docs deps need manual coordination; minor/patch is enough for security.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # API (FastAPI, managed with uv)
  - package-ecosystem: "uv"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # datasets 4.x removes loading-script support (`trust_remote_code` workflows) that
      # several gallery training scripts rely on. Deliberately pinned to 3.x; a datasets
      # upgrade needs its own dedicated PR with full validation. See PR #2090.
      - dependency-name: "datasets"
        versions: [">=4"]
      # azure-mgmt-resource 25.0.0 removed/relocated `SubscriptionClient`, which our
      # Azure compute provider imports from `azure.mgmt.resource`. Provider health check
      # fails immediately on import. Revisit after refactoring the import path. See PR #2083.
      - dependency-name: "azure-mgmt-resource"
        versions: [">=25"]

  # CLI (Typer, managed with uv)
  - package-ecosystem: "uv"
    directory: "/cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Lab SDK (published to PyPI as `transformerlab`)
  - package-ecosystem: "uv"
    directory: "/lab-sdk"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
