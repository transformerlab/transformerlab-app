repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        name: ruff check (api, cli, lab-sdk)
        args: [--fix, --line-length=120]
        files: ^(api|cli|lab-sdk)/.*\.py$
      - id: ruff-format
        name: ruff format (api, cli, lab-sdk)
        args: [--line-length=120]
        files: ^(api|cli|lab-sdk)/.*\.py$

  - repo: local
    hooks:
      - id: npm-format
        name: npm run format (prettier)
        entry: npm run format
        language: system
        pass_filenames: false
        files: ^(src|transformerlab-docs)/.*\.(js|jsx|ts|tsx|json|css|scss|md|mdx|ya?ml)$
  - repo: local
    hooks:
      - id: react-doctor
        name: react-doctor
        entry: sh -c 'react_doctor_output=$(mktemp "${TMPDIR:-/tmp}/react-doctor-hook.XXXXXX"); if react-doctor --staged --fail-on warning > "$react_doctor_output" 2>&1; then rm -f "$react_doctor_output"; else rm -f "$react_doctor_output"; printf "%s\n" "React Doctor found staged regressions." "Run react-doctor --staged --fail-on warning to inspect." "Want them fixed? Ask your agent to run that command and resolve the findings." >&2; fi'
        language: system
        pass_filenames: false
