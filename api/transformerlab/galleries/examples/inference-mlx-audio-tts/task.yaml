name: mlx-audio-tts
github_repo_url: https://github.com/transformerlab/transformerlab-app
github_repo_dir: api/transformerlab/galleries/examples/inference-mlx-audio-tts
resources:
  cpus: 2
  memory: 4
setup: |
  brew install espeak-ng
  uv pip install "mlx-audio==0.2.10" gradio "librosa>=0.11.0" sounddevice numpy scipy
  uv pip install pip
  python -c "import gradio; print('gradio installed at:', gradio.__file__)"
  python -c "import mlx_audio; print('mlx_audio installed at:', mlx_audio.__file__)"
run: |
  python inference-mlx-audio-tts/run.py
envs:
  PYTHONUNBUFFERED: "1"
  ESPEAK_DATA_PATH: "/opt/homebrew/share/espeak-ng-data"
parameters:
  model_name:
    field_name: "Model Name"
    env_var: "MODEL_NAME"
    field_type: "str"
    required: true
    placeholder: "e.g. mlx-community/Kokoro-82M-bf16"
    help_text: "HuggingFace model identifier for an MLX-compatible TTS model (e.g. mlx-community/Kokoro-82M-bf16, mlx-community/Dia-1.6B-fp16)"
