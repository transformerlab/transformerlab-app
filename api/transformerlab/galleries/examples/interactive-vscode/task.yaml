name: vscode
github_repo_url: https://github.com/transformerlab/transformerlab-app
github_repo_dir: api/transformerlab/galleries/examples/interactive-vscode
resources:
  cpus: 2
  memory: 4
setup: |
  if [ "$(uname)" != "Darwin" ]; then
    $SUDO apt-get update && $SUDO apt-get install -y gnupg software-properties-common apt-transport-https wget
    wget -qO- https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > packages.microsoft.gpg
    $SUDO install -o root -g root -m 644 packages.microsoft.gpg /usr/share/keyrings/
    echo "deb [arch=amd64 signed-by=/usr/share/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main" | $SUDO tee /etc/apt/sources.list.d/vscode.list
    $SUDO apt-get update && $SUDO apt-get install -y code
  fi
run: |
  python interactive-vscode/run.py
envs:
  PYTHONUNBUFFERED: "1"
