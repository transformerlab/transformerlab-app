name: video-generation-wan-task
github_repo_url: https://github.com/transformerlab/transformerlab-app
github_repo_dir: api/transformerlab/galleries/examples/video-diffusion
resources:
  accelerators: "A100:1"
envs:
  PYTHONUNBUFFERED: "1"
  HF_TOKEN: "{{secret._HF_TOKEN}}"
setup: "uv pip install diffusers 'transformers>=4.41.0' 'peft>=0.17.0' accelerate ftfy huggingface-hub opencv-python transformerlab imageio-ffmpeg"
parameters:
  model_id: "Wan-AI/Wan2.1-T2V-1.3B-Diffusers"
  prompt: "A cat walks on the grass, realistic"
  negative_prompt: ""
  height: 480
  width: 832
  num_frames: 81
  guidance_scale: 5.0
  fps: 15
run: "python video-diffusion/main.py"
