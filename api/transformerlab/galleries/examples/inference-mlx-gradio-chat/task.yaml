name: mlx-gradio-chat
github_repo_url: https://github.com/transformerlab/transformerlab-app
github_repo_dir: api/transformerlab/galleries/examples/inference-mlx-gradio-chat
resources:
  cpus: 2
  memory: 4
setup: |
  uv pip install --upgrade gradio
  uv pip install openai "mlx-lm>=0.28.3"
run: |
  python inference-mlx-gradio-chat/run.py
envs:
  PYTHONUNBUFFERED: "1"
parameters:
  model_name:
    field_name: "Model Name"
    env_var: "MODEL_NAME"
    field_type: "str"
    required: true
    placeholder: "e.g. mlx-community/Llama-3.2-3B-Instruct-4bit"
    help_text: "HuggingFace model identifier (must be an MLX-compatible model, e.g. from mlx-community)"
