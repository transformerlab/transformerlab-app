name: ollama-open-webui
github_repo_url: https://github.com/transformerlab/transformerlab-app
github_repo_dir: api/transformerlab/galleries/examples/interactive-ollama-openwebui
resources:
  cpus: 2
  memory: 8
setup: |
  if ! command -v uv >/dev/null 2>&1; then curl -LsSf https://astral.sh/uv/install.sh | sh; fi
  export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
  uv pip install open-webui
  if ! command -v ollama >/dev/null 2>&1; then curl -fsSL https://ollama.com/install.sh | sh; fi
  if [ "$(uname)" != "Darwin" ]; then $SUDO apt-get update && $SUDO apt-get install -y pciutils lshw; fi
run: |
  python interactive-ollama-openwebui/run.py
envs:
  PYTHONUNBUFFERED: "1"
parameters:
  model_name:
    field_name: "Model Name"
    env_var: "MODEL_NAME"
    field_type: "str"
    required: true
    placeholder: "e.g. llama2, mistral, codellama"
    help_text: "Ollama model name (e.g. llama2, mistral, codellama). Use \"ollama pull <model>\" to download models."
